<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>

    <style>
        body
        {
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#eef5ff,#f9fbff);
            text-align:center;
        }
        .navbar
        {
            background:#003366;
            color:white;
            padding:22px;
            font-size:30px;
            font-weight:bold;
        }
        .card
        {
            background:white;
            width:420px;
            margin:90px auto;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }
        h1
        {
            color:#003366;
        }
        input
        {
            width:90%;
            padding:12px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }
        button
        {
            background:#007bff;
            color:white;
            border:none;
            padding:12px 35px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }
        .back
        {
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#003366;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="navbar">✈ Airport Management System</div>

<div class="card">
    <h1>Forgot Password</h1>
    <p style="color:red;" th:text="${error}"></p>
    <p style="color:green;" th:text="${success}"></p>

    <form action="/forgotPassword" method="post">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="newPassword"
               placeholder="Enter New Password"
               required>

        <br><br>

        <button type="submit">Reset Password</button>
    </form>

    <br>

    <a href="/login" class="back">← Back to Login</a>

</div>

</body>
</html>
