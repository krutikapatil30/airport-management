<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Flights List</title>

    <style>
        body 
        {
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#eef5ff,#f9fbff);
            text-align:center;
        }
        .navbar 
        {
            background:#003366;
            color:white;
            padding:18px;
            text-align:center;
            font-size:30px;
            font-weight:bold;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }
        h1 
        {
            color:#003366;
            font-size:42px;
            margin-top:40px;
            text-shadow:2px 2px 8px rgba(0,0,0,0.12);
        }
        .form-box 
        {
            margin:25px auto;
            background:white;
            padding:20px;
            width:70%;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }
        input 
        {
            padding:12px;
            margin:8px;
            width:220px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }
        select
        {
            padding:12px;
            margin:8px;
            width:220px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }
        button 
        {
            padding:12px 22px;
            background:linear-gradient(135deg,#007bff,#0056b3);
            color:white;
            border:none;
            border-radius:8px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }
        button:hover 
        {
            transform:translateY(-2px);
            background:linear-gradient(135deg,#0056b3,#003366);
        }
        table 
        {
            margin:35px auto;
            border-collapse:collapse;
            width:85%;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 6px 18px rgba(0,0,0,0.15);
        }
        th, td 
        {
            padding:15px;
            border-bottom:1px solid #ddd;
            font-size:16px;
        }
        th 
        {
            background:#003366;
            color:white;
            font-size:18px;
        }

        tr:hover 
        {
            background:#f1f7ff;
        }
        a 
        {
            color:#007bff;
            font-weight:bold;
            text-decoration:none;
        }
        a:hover
        {
            text-decoration:underline;
        }
        .back-btn 
        {
            display:inline-block;
            margin-top:10px;
            color:#003366;
            font-weight:bold;
            text-decoration:none;
        }
        .footer 
        {
            background:#003366;
            color:white;
            text-align:center;
            padding:18px;
            margin-top:70px;
            font-size:18px;
        }
        .btn-edit
        {
            background:#28a745;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:6px;
            font-weight:bold;
        }
        .btn-edit:hover
        {
            background:#218838;
        }
        .btn-delete
        {
            background:#dc3545;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:6px;
            font-weight:bold;
        }
        .btn-delete:hover
        {
            background:#c82333;
        }
    </style>
</head>

<body>

    <div class="navbar">
        ✈ Airport Management System
    </div>

    <h1>Available Flights</h1>

    <div class="form-box">
        <form action="/saveFlight" method="post">
            <input type="text" name="flightNumber" placeholder="Enter Flight Number" required>
            <input type="text" name="flightName" placeholder="Enter Flight Name" required>
            <input type="text" name="source" placeholder="Enter Source" required>
            <input type="text" name="destination" placeholder="Enter Destination" required>
            <select name="status" required>
                <option value="">Select Status</option>
                <option value="On Time">On Time</option>
                <option value="Delayed">Delayed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <input type="time" name="departureTime" required>
            <input type="time" name="arrivalTime" required>
            <select name="flightClass" required>
                <option value="">Select Class</option>
                <option value="Economy">Economy</option>
                <option value="Business">Business</option>
                <option value="First Class">First Class</option>
            </select>
            <input type="number" name="ticketPrice" placeholder="Enter Ticket Price" required>
            <input type="number" name="availableSeats" placeholder="Enter Available Seats" required>
            <button type="submit">Add Flight</button>
        </form>

        <br>

        <form action="/searchFlight" method="get">
            <input type="text" name="keyword" placeholder="Search Flight Name">
            <button type="submit">Search</button>
        </form>

        <a href="/" class="back-btn">← Back to Home</a>
    </div>

   <table>
        <tr>
            <th>ID</th>
            <th>Flight No</th>
            <th>Flight Name</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Departure Time</th>
            <th>Arrival Time</th>
            <th>Class</th>
            <th>Ticket Price</th>
            <th>Available Seats</th>
            <th>Action</th>
        </tr>

        <tr th:each="flight : ${flights}">
            <td th:text="${flight.flightId}"></td>
            <td th:text="${flight.flightNumber}"></td>
            <td th:text="${flight.flightName}"></td>
            <td th:text="${flight.source}"></td>
            <td th:text="${flight.destination}"></td>
            <td th:text="${flight.status}"></td>
            <td th:text="${flight.departureTime}"></td>
            <td th:text="${flight.arrivalTime}"></td>
            <td th:text="${flight.flightClass}"></td>
            <td th:text="${flight.ticketPrice}"></td>
            <td th:text="${flight.availableSeats}"></td>
            
            <td>
                <a th:href="@{/editFlight/{id}(id=${flight.flightId})}"
                class="btn-edit">
                    Edit
                </a>
                
                <a th:href="@{/deleteFlight/{id}(id=${flight.flightId})}"
                class="btn-delete" onclick="return confirm('Are you sure you want to delete this flight?')">
                    Delete
                </a>

            </td>
        </tr>
    </table>

    <div class="footer">
        © 2026 Airport Management System
    </div>

</body>
</html>
