<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>
</head>
<body>

<h2>Admin Login</h2>

<form action="/login" method="post">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">Login</button>

</form>

<p style="color:red"
   th:text="${error}">
</p>

</body>
</html>
