<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>

    <style>
        body
        {
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#eef5ff,#f9fbff);
            text-align:center;
        }
        .navbar
        {
            background:#003366;
            color:white;
            padding:22px;
            font-size:30px;
            font-weight:bold;
        }
        .card
        {
            background:white;
            width:450px;
            margin:80px auto;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }
        h2
        {
            color:#003366;
            margin-bottom:25px;
        }

        input
        {
            width:90%;
            padding:12px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }
        button
        {
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            margin-top:10px;
        }
        button:hover
        {
            background:#0056b3;
        }
        .success
        {
            color:green;
            font-weight:bold;
        }
        .error
        {
            color:red;
            font-weight:bold;
        }
        .back
        {
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#003366;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="navbar">
    ✈ Airport Management System
</div>

<div class="card">

    <h2>Change Password</h2>

    <p class="success" th:text="${success}"></p>
    <p class="error" th:text="${error}"></p>

    <form action="/updatePassword" method="post">

        <input type="password"
               name="oldPassword"
               placeholder="Enter Old Password"
               required>

        <input type="password"
               name="newPassword"
               placeholder="Enter New Password"
               required>

        <br>

        <button type="submit">
            Update Password
        </button>

    </form>

    <a href="/admin/dashboard" class="back">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
